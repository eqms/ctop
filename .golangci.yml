version: "2"
linters:
  settings:
    errcheck:
      exclude-functions:
        - (*github.com/nsf/termbox-go).Clear
        - (*github.com/nsf/termbox-go).Sync
        - (github.com/pkg/browser).OpenURL
        - fmt.Fprintf
        - fmt.Fprintln
    govet:
      disable:
        - composites
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - staticcheck
        text: QF1008
      - linters:
          - staticcheck
        path: connector/docker.go
        text: SA4004
      - linters:
          - errcheck
        path: (grid|menus|cursor)\.go
        text: (RefreshDisplay|RefreshContainers|tm\.Clear|tm\.Sync)
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
